      static_pages:
        democratic_quality_indicators:
          content: '<h2>Sistema de indicadores para medir la calidad de la participación en Decidim.</h2>

            <h3>Introducción</h3>
            <p>La calidad democrática es un principio básico de Decidim. Para mantenerlo, se ha desarrollado un sistema de indicadores que ayudan a evaluar la calidad de los procesos participativos en la plataforma. En este artículo explicamos cómo se calculan estos indicadores.</p>

            <h3>¿Cómo se calculan los indicadores?</h3>
            <p>Se han definido dos métodos para la recogida de indicadores de calidad:</p> 

            <ol>
            <li><strong>Métricas automáticas:</strong> Se calculan directamente a partir de los datos de la plataforma Decidim.</li>
            <li><strong>Métricas de autoevaluación:</strong> Se basan en un formulario que rellena un administrador.</li>
            </ol>.

            <p>Cada indicador se expresa como un porcentaje (n/total). A continuación, este porcentaje se convierte en una puntuación en una escala de 1 a 5:</p>

            <ul>
            <li>1 = 0-20%</li>
            <li>2 = 20-40%</li>
            <li>3 = 40-60%</li>
            <li>4 = 60-80%</li>
            <li>5 = 80-100%</li>
            </ul>

            <br><br>
            <h3>Métricas automáticas</h3>
            <p>Estos indicadores se obtienen automáticamente a partir de los datos recogidos en la plataforma. Se evalúan por cada proceso participativo y pueden ser hechas públicas por las responsables del proceso, para que todas las participantes puedan acceder a ellas.</p>

            <p>Se han definido cuatro indicadores principales: Influencia Ciudadana, Hibridación, Capacidad de Respuesta y Trazabilidad:</p>

            <h3>Influencia ciudadana</h3>
            <p>Este indicador mide el nivel de influencia ciudadana en las propuestas aceptadas y los resultados del proceso</p>

            <ul>
            <li>
            Influencia ciudadana en las propuestas
            <ul>
            <li>Porcentaje de propuestas aceptadas (n/total)</li>
            <li>Porcentaje de propuestas <em>ciudadanas</em> aprobadas sobre el total de propuestas ciudadanas (influencia ciudadana total en propuestas aprobadas)</li>
            <li>Porcentaje de propuestas ciudadanas aprobadas sobre total de propuestas aprobadas (influencia ciudadana relativa sobre propuesta aprobada)</li>
            </ul>
            </li>
            <li>Influencia ciudadana sobre los resultados
            <ul>
            <li>Porcentaje de resultados vinculados a propuestas ciudadanas sobre el total de resultados (influencia ciudadana total sobre resultados)</li>
            </ul>
            </li>
            </ul>

            <h3>Hibridación</h3>

            <p>Este indicador mide el nivel de combinación entre espacios presenciales y digitales durante el proceso.</p> 
            <ul>
            <li>¿Hay algún componente de encuentros? (Sí=5, No=0)</li>
            <li>¿Hay encuentros presenciales? (Sí=5, No=0)</li>
            <li>¿Hay encuentros online? (Sí=5, No=0)</li>
            <li>¿Hay encuentros híbridas? (Sí=5, No=0)</li>
            <li>¿Se crean propuestas a partir de los encuentros? (Sí=5, No=0)</li>
            </ul>

            <h3>Capacidad de respuesta</h3>

            <p>Este indicador mide el nivel de respuesta de la organización a las aportaciones de las participantes, y refleja su compromiso a través de respuestas oficiales y decisiones implementadas.</p> <p>
            <ul>
            <li>Porcentaje de propuestas con respuesta (n/total) - Capacidad de respuesta institucional de la propuesta</li>
            <li>Porcentaje de resultados completados al 100% (n/total)</li>
            </ul>

            <h3>Trazabilidad</h3>

            <p>Este indicador mide la transparencia y trazabilidad del proceso participativo. Refleja con qué facilidad la ciudadanía pueden seguir la evolución de las propuestas y verificar las acciones institucionales a través de los registros publicados.</p> 
            <ul>
            <li>Número de propuestas con historial (n/total)</li>
            <li>Porcentaje de resultados vinculados a propuestas (n/total)</li>
            <li>Porcentaje de encuentros cerrados con acta publicada (n/total)</li>
            <li>Activación del módulo de datos abiertos (dicotómico: 0 ó 5)</li>
            <li>Porcentaje de propuestas relacionadas con presupuestos (n/total)</li>
            </ul>

            <br><br>
            <h3>Métricas de autoevaluación</h3>

            <p>Además de las métricas automáticas, proponemos el uso de un <strong>formulario de autoevaluación</strong> para valorar las dimensiones cualitativas de cada proceso participativo. Este formulario será rellenado, al finalizar cada proceso participativo, por las responsables de estos, y las respuestas se mostrarán públicamente en el bloque de contenido de indicadores.</p> 

            <p>Estas preguntas pretenden captar aspectos de la calidad democrática que no pueden evaluarse únicamente a través de datos cuantitativos. Es importante tener en cuenta que las respuestas a esta encuesta están sesgadas por la opinión de las responsables del proceso participativo en cuestión.</p> 

            <br><br>
            <h3>Preguntas de autoevaluación</h3>

            <p>A continuación se exponen las preguntas que componen el formulario de autoevaluación respondidas por las responsables del proceso, así como los valores asociados a cada respuesta.</p> 

            <h4>Inclusividad</h4>

            <p>Inclusividad según el origen cultural y la diversidad funcional.</p>

            <ol>
            <li>¿Se ha invitado a participar a personas de orígenes diversos?
            <ul>
            <li>Sí = 5</li>
            <li>No = 0</li>
            </ul>
            </li>
            <li>¿Cuántas personas de orígenes culturales diversos han participado al margen de a quien se havia incitado?
            <ul>
            <li>0-20% = 1</li>
            <li>20-40% = 2</li>
            <li>40-60% = 3</li>
            <li>60-80% = 4</li>
            <li>80-100% = 5</li>
            </ul>
            </li>
            <li>¿Se ha invitado a grupos de personas con diversidad funcional a participar?
            <ul>
            <li>Sí = 5</li>
            <li>No = 0</li>
            </ul>
            </li>
            <li>¿Cuántas personas con diversidad funcional han participado al margen de a quien se havia invitado?
            <ul>
            <li>0-20% = 1</li>
            <li>20-40% = 2</li>
            <li>40-60% = 3</li>
            <li>60-80% = 4</li>
            <li>80-100% = 5</li>
            </ul>
            </li>
            </ol>

            <h4>Relevancia</h4>

            <p>Relevancia del impacto, tales como: porcentaje del presupuesto de la organización, de los recursos humanos la organización implicados, o del total de la población, que se verá afectada por los resultados del proceso, y el tiempo dedicado a tal impacto.</p>

            <ol>
            <li>Porcentaje del presupuesto de la organización, de los recursos humanos la organización implicados, o del total de la población, que se verá afectada por los resultados del proceso.
            <ul>
            <li>0-20% = 1</li>
            <li>20-40% = 2</li>
            <li>40-60% = 3</li>
            <li>60-80% = 4</li>
            <li>80-100% = 5</li>
            </ul>
            </li>
            </ol>
            <h4>Influencia ciudadana</h4>
            <ol>
            <li>Nivel de influencia del proceso teniendo en cuenta los mecanismos de participación habilitados, de acuerdo a la escalera de participación definida por Satin y Arnstein (1969).
            <ul>
            <li>Informativo = 0
            <p>El flujo de información es unidireccional -del personal municipal hacia la ciudadanía- sin canal de retroalimentación ni capacidad de negociación.</p>
            </li>
            <li>Consultivo = 1
            <p>Un proceso participativo en el que se pide a la ciudadanía su opinión, normalmente a través de encuestas o reuniones, pero sin garantía de que su aportación influya en las decisiones.</p>
            </li>
            <li>Participación simbólica = 2
            <p>Un proceso participativo en el que se concede a la ciudadanía una influencia limitada, a menudo de forma simbólica, como la inclusión en juntas o comités, pero sin poder real, ya que la toma de decisiones sigue controlada por la élite de poder tradicional.</p>
            </li>
            <li>Colaborativo = 3
            <p>Un proceso participativo en el que la ciudadanía y el tejido asociativo comparten el poder de decisión, lo que permite a las participantes negociar, asignar recursos e influir en la planificación, con normas que no pueden modificarse unilateralmente. Suele surgir de la movilización ciudadana y la acción colectiva.</p>
            </li>
            <li>Competencia delegada = 4
            <p>Un proceso participativo en el que la ciudadanía adquiere autoridad, control o financiación para influir en una organización y gestionarla.</p>
            </li>
            <li>Control ciudadano = 5
            <p>Un nivel de participación más alto donde la ciudadanía gobierna plenamente un programa o institución, gestionan políticas, recursos y toma de decisiones sin interferencia externa.</p>
            </li>
            </ul>
            </li>
            <li>Porcentaje de fases con intervención ciudadana en la toma de decisiones (de 0 a 5)
            <p>De todas las fases del proceso (desde la selección de temas hasta la supervisión de la ejecución), ¿en cuántas de ellas la ciudadanía tiene capacidad para tomar decisiones o emprender acciones ejecutivas?</p>
            <ul>
            <li>0-20% = 1</li>
            <li>20-40% = 2</li>
            <li>40-60% = 3</li>
            <li>60-80% = 4</li>
            <li>80-100% = 5</li>
            </ul>
            </li>
            </ol>

            <h4>Accesibilidad</h4>
            <ol>
            <li>¿En cuántos idiomas se ha comunicado el conflicto?
            <ul>
            <li>Un idioma = 1</li>
            <li>Menos de la mitad de los idiomas hablados en la comunidad = 2,5</li>
            <li>Más de la mitad de los idiomas hablados en la comunidad = 5</li>
            </ul>
            </li>
            <li>¿Las salas de los encuentros presenciales: eran accesibles para las personas con movilidad reducida?
            <ul>
            <li>No = 0</li>
            <li>Parcialmente = 2,5</li>
            <li>Sí = 5</li>
            </ul>
            </li>
            </ol>'
